name: Python Pull Request Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu z Pull Requesta
      uses: actions/checkout@v4

    - name: Konfiguracja środowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Instalacja zależności
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Sprawdzenie fundamentalnych błędów składni (Linter)
      run: |
        flake8 api notifications src tests --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Uruchomienie testów (pytest)
      env:
        PYTHONPATH: src/stalcraft_market_analyzer
      run: |
        pytest
